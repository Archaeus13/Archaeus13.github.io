<!DOCTYPE html>
<html lang="zh-CN" data-theme="fantasy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Werewolf Statistics</title>
  <!-- Tailwind CSS & DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.3/dist/full.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'game': ['"ZCOOL KuaiLe"', 'cursive'],
            'sans': ['"Noto Sans SC"', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    /* 基础动画效果 */
    .tab-content {
      display: none;
      opacity: 0;
      transition: all 0.3s ease;
    }
    
    .tab-content.active {
      display: block;
      opacity: 1;
      animation: fadeInRight 0.5s ease;
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* 移除统计卡片的浮动动画 */
    .stats {
      transition: all 0.3s ease;
    }

    .table-row-animate {
      transition: all 0.3s ease;
    }

    .table-row-animate:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      z-index: 10;
    }

    /* 主题过渡动画 */
    .theme-transition {
      transition: all 0.3s ease;
    }

    /* 表格列宽固定 */
    .table-fixed-layout {
      table-layout: fixed;
    }

    .table-fixed-layout th,
    .table-fixed-layout td {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    /* 定义列宽 */
    .col-rank { width: 10%; }
    .col-name { width: 30%; }
    .col-games { width: 20%; }
    .col-stats { width: 20%; }
    .col-rate { width: 20%; }

    /* 渐变色文本 */
    [data-theme="fantasy"] .gradient-text {
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      transition: background 0.3s ease;
    }

    [data-theme="fantasy"] .rainbow-text {
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      transition: background 0.3s ease;
    }

    /* 暗黑模式文字颜色 */
    [data-theme="dracula"] .gradient-text,
    [data-theme="dracula"] .rainbow-text,
    [data-theme="dracula"] .text-base-300 {
      background: none !important;
      -webkit-background-clip: unset !important;
      background-clip: unset !important;
      color: hsl(var(--bc)) !important;
    }

    /* 暗黑模式下的特殊文字颜色 */
    [data-theme="dracula"] .text-warning {
      color: hsl(var(--wa)) !important;
    }

    [data-theme="dracula"] .text-success {
      color: hsl(var(--su)) !important;
    }

    [data-theme="dracula"] .text-error {
      color: hsl(var(--er)) !important;
    }

    /* 文字居中 */
    .table th,
    .table td,
    .stat-title,
    .stat-value,
    .pagination-info {
      text-align: center !important;
    }

    /* 胜率渐变 */
    .winrate-gradient {
      background: linear-gradient(90deg, 
        hsl(0, 100%, 50%) 0%,
        hsl(60, 100%, 50%) 50%,
        hsl(120, 100%, 50%) 100%);
      background-size: 200% 100%;
    }

    /* 移除旧的积分渐变样式 */
    .points-gradient {
      display: none;
    }

    /* 负分显示样式 */
    .points-negative {
      color: hsl(0, 0%, 40%) !important;
    }

    /* 最高分彩虹效果 */
    .rainbow-text {
      background: linear-gradient(
        90deg,
        #ff0000 0%,
        #ffa500 14.28%,
        #ffff00 28.56%,
        #00ff00 42.84%,
        #00ffff 57.12%,
        #0000ff 71.4%,
        #ff00ff 85.68%,
        #ff0000 100%
      );
      background-size: 200% auto;
      animation: rainbow 5s linear infinite;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* 添加积分数值的过渡动画 */
    .points-value {
      transition: color 0.3s ease;
    }

    @keyframes rainbow {
      to {
        background-position: -200% center;
      }
    }

    /* 统一圆角样式 */
    .card, .btn, .table, .select, .alert, .stats {
      border-radius: 1rem !important;
    }

    .table th:first-child {
      border-top-left-radius: 1rem !important;
    }

    .table th:last-child {
      border-top-right-radius: 1rem !important;
    }

    .table tr:last-child td:first-child {
      border-bottom-left-radius: 1rem !important;
    }

    .table tr:last-child td:last-child {
      border-bottom-right-radius: 1rem !important;
    }

    /* 移除主题特定样式中的圆角设置 */
    [data-theme="fantasy"] {
      --primary-color: hsl(var(--p));
      --secondary-color: hsl(var(--s));
      --accent-color: hsl(var(--a));
    }

    [data-theme="dracula"] {
      --primary-color: hsl(var(--p));
      --secondary-color: hsl(var(--s));
      --accent-color: hsl(var(--a));
    }

    /* 移除之前的 .card, .btn, .table 样式覆盖 */
    .card {
      box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
    }

    .btn {
      text-transform: none;
    }

    .table {
      width: 100%;
    }

    /* 添加统计卡片的特殊处理 */
    .stats.shadow {
      overflow: hidden;
      border-radius: 1rem !important;
    }

    .stats > .stat:first-child {
      border-top-left-radius: 1rem !important;
      border-bottom-left-radius: 1rem !important;
    }

    .stats > .stat:last-child {
      border-top-right-radius: 1rem !important;
      border-bottom-right-radius: 1rem !important;
    }

    /* 分页按钮样式 */
    .pagination-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
      padding: 1rem;
    }

    .pagination-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .pagination-info {
      font-size: 0.875rem;
      opacity: 0.7;
    }

    /* 统一表格文字样式 */
    .table td {
      font-weight: 500 !important;
    }

    /* 排名前三特殊样式 */
    .rank-top {
      color: hsl(var(--wa)) !important;
      font-weight: 700 !important;
    }
  </style>
</head>

  <script>
    /************************************************
     * 0. 全局变量 & 默认排序
     ***********************************************/
    const tableSortConfig = {
      pointsTable: { key: 'points', order: 'desc' },
      winRateTable: { key: 'totalWinRate', order: 'desc' },
      factionRateTable: { key: 'goodRate', order: 'desc' },
      factionWinRateTable: { key: 'goodWinRate', order: 'desc' }
    };

    let globalStats = [];
    let currentTab = 'pointsSection';

    /************************************************
     * 1. 工具函数
     ***********************************************/
    function showLoading() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('loading').classList.add('flex');
    }

    function hideLoading() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('loading').classList.remove('flex');
    }

    function formatNumber(num, decimals = 1) {
      return Number(num).toFixed(decimals);
    }

    function formatPercentage(value) {
      return typeof value === 'string' ? value : `${formatNumber(value)}%`;
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `alert alert-${type} fixed bottom-4 right-4 z-50 animate__animated animate__fadeInUp`;
      toast.innerHTML = `
        <div>
          <i class="fas fa-${type === 'success' ? 'check' : 'exclamation'}-circle"></i>
          <span>${message}</span>
        </div>
      `;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.classList.replace('animate__fadeInUp', 'animate__fadeOutDown');
        setTimeout(() => toast.remove(), 1000);
      }, 3000);
    }

    /************************************************
     * 2. 标签切换逻辑
     ***********************************************/
    function showTab(sectionId, element) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('tab-active'));
      element.classList.add('tab-active');

      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.getElementById(sectionId).classList.add('active');

      currentTab = sectionId;
      
      if (globalStats.length > 0) {
        renderTable(sectionId.replace('Section', ''));
      }
    }

    /************************************************
     * 3. 表格渲染逻辑
     ***********************************************/
    function renderTable(type) {
      const tableId = `${type}Table`;
      const table = document.getElementById(tableId);
      if (!table) return;

      const sortedData = [...globalStats].sort((a, b) => {
        const { key, order } = tableSortConfig[tableId];
        let aVal = a[key];
        let bVal = b[key];
        
        // 处理百分比字符串和数值
        if (typeof aVal === 'string') {
          aVal = parseFloat(aVal.replace('%', ''));
        }
        if (typeof bVal === 'string') {
          bVal = parseFloat(bVal.replace('%', ''));
        }
        
        return order === 'asc' ? aVal - bVal : bVal - aVal;
      });

      const maxPoints = Math.max(...sortedData.map(p => p.points));
      const maxWinRate = Math.max(...sortedData.map(p => p.totalWinRate));

      let html = `
        <thead>
          <tr class="text-base-content">
            <th class="bg-base-200 col-rank">Rank</th>
            <th class="bg-base-200 col-name">Player</th>
            <th class="bg-base-200 col-games">
              Games
              <button class="btn btn-ghost btn-xs" onclick="toggleSort('totalGames', '${type}')">
                <i class="fas fa-sort"></i>
              </button>
            </th>
      `;

      switch (type) {
        case 'points':
          html += `
            <th class="bg-base-200 col-stats">
              Points
              <button class="btn btn-ghost btn-xs" onclick="toggleSort('points', '${type}')">
                <i class="fas fa-sort"></i>
              </button>
            </th>
          `;
          break;
        case 'winRate':
          html += `
            <th class="bg-base-200 col-stats">
              Win Rate
              <button class="btn btn-ghost btn-xs" onclick="toggleSort('totalWinRate', '${type}')">
                <i class="fas fa-sort"></i>
              </button>
            </th>
          `;
          break;
        case 'factionRate':
          html += `
            <th class="bg-base-200 col-rate">
              Good Rate
              <button class="btn btn-ghost btn-xs" onclick="toggleSort('goodRate', '${type}')">
                <i class="fas fa-sort"></i>
              </button>
            </th>
            <th class="bg-base-200 col-rate">
              Wolf Rate
              <button class="btn btn-ghost btn-xs" onclick="toggleSort('wolfRate', '${type}')">
                <i class="fas fa-sort"></i>
              </button>
            </th>
          `;
          break;
        case 'factionWinRate':
          html += `
            <th class="bg-base-200 col-rate">
              Good Win Rate
              <button class="btn btn-ghost btn-xs" onclick="toggleSort('goodWinRate', '${type}')">
                <i class="fas fa-sort"></i>
              </button>
            </th>
            <th class="bg-base-200 col-rate">
              Wolf Win Rate
              <button class="btn btn-ghost btn-xs" onclick="toggleSort('wolfWinRate', '${type}')">
                <i class="fas fa-sort"></i>
              </button>
            </th>
          `;
          break;
      }
      html += '</tr></thead><tbody>';

      sortedData.forEach((stat, index) => {
        const rank = index + 1;
        html += `<tr class="table-row-animate hover">`;
        html += `
          <td class="font-bold ${rank <= 3 ? 'text-warning' : ''}">${rank}</td>
          <td>${stat.name}</td>
          <td>${stat.totalGames}</td>
        `;

        switch (type) {
          case 'points':
            html += `
              <td class="font-bold ${stat.points === maxPoints ? 'rainbow-text' : ''}">
                ${formatNumber(stat.points, 1)}
              </td>
            `;
            break;

          case 'winRate':
            html += `
              <td class="font-bold ${stat.totalWinRate === maxWinRate ? 'rainbow-text' : ''}">
                ${formatPercentage(stat.totalWinRate)}
              </td>
            `;
            break;

          case 'factionRate':
            html += `
              <td>${formatPercentage(stat.goodRate)}</td>
              <td>${formatPercentage(stat.wolfRate)}</td>
            `;
            break;

          case 'factionWinRate':
            html += `
              <td>${formatPercentage(stat.goodWinRate)}</td>
              <td>${formatPercentage(stat.wolfWinRate)}</td>
            `;
            break;
        }
        html += '</tr>';
      });

      html += '</tbody>';
      table.className = 'table table-zebra w-full table-fixed-layout';
      table.innerHTML = html;
    }

    /************************************************
     * 4. 排序逻辑
     ***********************************************/
    function toggleSort(key, type) {
      const tableId = `${type}Table`;
      const config = tableSortConfig[tableId];
      
      if (config.key === key) {
        config.order = config.order === 'asc' ? 'desc' : 'asc';
      } else {
        config.key = key;
        config.order = 'desc';
      }
      
      renderTable(type);
    }

    /************************************************
     * 5. 统计计算逻辑
     ***********************************************/
    function calculateStats(gameRecords) {
      const playerStats = {};

      gameRecords.forEach(record => {
        record.players.forEach(player => {
          const { name, faction } = player;
          const playerName = name || '未知玩家';

          if (!playerStats[playerName]) {
            playerStats[playerName] = {
              name: playerName,
              goodWins: 0,
              goodGames: 0,
              wolfWins: 0,
              wolfGames: 0,
              totalWins: 0,
              totalGames: 0,
              points: 0
            };
          }
          
          const stats = playerStats[playerName];
          stats.totalGames++;
          
          if (faction === 1) {
            stats.goodGames++;
            if (record.gameWinner === '好人') {
              stats.goodWins++;
              stats.totalWins++;
              stats.points += 1;
            } else {
              stats.points -= 1;
            }
          } else {
            stats.wolfGames++;
            if (record.gameWinner === '狼人') {
              stats.wolfWins++;
              stats.totalWins++;
              stats.points += 1.5;
            } else {
              stats.points -= 1;
            }
          }
        });
      });

      return Object.values(playerStats).map(p => ({
        ...p,
        goodRate: p.totalGames > 0 ? (p.goodGames / p.totalGames) * 100 : 0,
        wolfRate: p.totalGames > 0 ? (p.wolfGames / p.totalGames) * 100 : 0,
        goodWinRate: p.goodGames > 0 ? (p.goodWins / p.goodGames) * 100 : 0,
        wolfWinRate: p.wolfGames > 0 ? (p.wolfWins / p.wolfGames) * 100 : 0,
        totalWinRate: p.totalGames > 0 ? (p.totalWins / p.totalGames) * 100 : 0
      }));
    }

    // 页面加载完成后立即处理数据
    document.addEventListener('DOMContentLoaded', function() {
      // 主题初始化
      const themes = ['fantasy', 'dracula'];
      let currentTheme = 0;

      // 添加主题切换按钮
      const themeBtn = document.createElement('button');
      themeBtn.className = 'btn btn-circle btn-lg fixed bottom-4 left-4 shadow-lg';
      themeBtn.innerHTML = '<i class="fas fa-moon"></i>';
      themeBtn.onclick = function() {
        currentTheme = (currentTheme + 1) % themes.length;
        const newTheme = themes[currentTheme];
        document.documentElement.setAttribute('data-theme', newTheme);
        
        // 更新图标
        this.innerHTML = `<i class="fas ${newTheme === 'fantasy' ? 'fa-moon' : 'fa-sun'}"></i>`;
        
        // 添加过渡动画类
        document.body.classList.add('theme-transition');
        setTimeout(() => {
          document.body.classList.remove('theme-transition');
        }, 300);
      };
      document.body.appendChild(themeBtn);

      // 立即处理数据
      try {
        globalStats = calculateStats(gameRecords);
        
        // 更新统计数据
        document.getElementById('totalPlayers').textContent = globalStats.length;
        document.getElementById('totalGames').textContent = gameRecords.length;
        document.getElementById('highestPoints').textContent = 
          Math.max(...globalStats.map(p => p.points)).toFixed(1);

        // 渲染所有表格
        renderTable('points');
        showToast(`Successfully loaded ${gameRecords.length} game records!`);
      } catch (err) {
        console.error('Error processing data:', err);
        showToast('Failed to process game records!', 'error');
      }
    });
  </script>
